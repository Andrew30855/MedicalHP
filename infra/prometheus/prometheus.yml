global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]
  - job_name: patient-service
    static_configs:
      - targets: ["patient-service:8000"]
  - job_name: doctor-schedule-service
    static_configs:
      - targets: ["doctor-schedule-service:8000"]
  - job_name: appointment-service
    static_configs:
      - targets: ["appointment-service:8000"]
  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8000"]
